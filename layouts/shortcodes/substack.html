<!--
  Embed formulaire Substack newsletter.
  Usage : substack url="https://tmkp.substack.com"
-->
<div class="sc-section" style="text-align:center;">
  <iframe
    src="{{ .Get "url" | default "https://tmkp.substack.com" }}/embed"
    width="100%"
    height="150"
    style="border:none; background:transparent;"
    frameborder="0"
    scrolling="no">
  </iframe>
</div>
